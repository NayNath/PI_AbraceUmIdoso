<div class="cadastro">
    <h1>SEJA UM VOLUNTÁRIO</h1>
    <form action="" method="post">

        <div class="coluna-esquerda">
            <label for="foto-perfil" ><img src="./../imagem/fotoPerfil.png" alt=""></label>
            <input type="file" id="foto-perfil" name="foto" accept="image/*" required>
            
            <label for="sobreVc">Fale sobre você:</label><br>
            <input type="text" name="sobreVc" id="sobreVc"><br>
        </div>
        <div class="coluna-direita">
            <label for="nome">Nome:</label><br>
            <input type="text" name="nome" id="name"><br>

            <label for="email">E-mail:</label><br>
            <input type="email" name="email" id="email"><br>

            <label for="dtNascimento">Data nascimento:</label><br>
            <input type="date" name="dtNascimento" id="dtNascimento"><br>

            <label for="CPF">CPF:</label><br>
            <input type="text" name="CPF" id="CPF"><br>

            <label for="telefone">Telefone:</label><br>
            <input type="tel" name="telefone" id="telefone" maxlength="12"><br>
<br>
            <label for="cep">CEP:</label>
            <input type="text" name="cep" id="cep">
            <label for="endereco">Endereço:</label>
            <input type="text" name="endereco" id="endereco">
            <label for="estado">Estado:</label>
            <input type="text" name="estado" id="estado">
            <label for="cidade">Cidade:</label>
            <input type="text" name="cidade" id="cidade">
            <label for="numbEnde">Número:</label>
            <input type="text" name="numbEnde" id="numbEnde">
<br>
            <label for="senha">Senha:</label><br>
            <input type="password" name="senha" id="senhaCPF"><br>

            <label for="senha">Confirmar senha:</label><br>
            <input type="password" name="senha" id="senha"><br>
        </div>

        <button type="submit" class="btn btn-marrom">Cadastrar</button>
    </form>
</div>
